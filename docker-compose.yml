services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: scuibai
      POSTGRES_USER: scuibai
      POSTGRES_PASSWORD: scuibai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scuibai"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_DB=scuibai
      - POSTGRES_USER=scuibai
      - POSTGRES_PASSWORD=scuibai_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
